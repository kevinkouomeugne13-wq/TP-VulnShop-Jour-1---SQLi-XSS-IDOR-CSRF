version: 2
updates:
  # 1) Surveillance des paquets npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # 2) Surveillance des actions GitHub (ex: actions/checkout)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
